name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          ndk-version: '23.2.8568313'

      - name: Download Godot 4.3 Stable
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          echo "Godot installed: $(godot --version)"

      - name: Download Godot Android Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip -q Godot_v4.3-stable_export_templates.tpz -d /tmp/templates
          cp /tmp/templates/templates/android_debug.apk   ~/.local/share/godot/export_templates/4.3.stable/
          cp /tmp/templates/templates/android_release.apk ~/.local/share/godot/export_templates/4.3.stable/
          cp /tmp/templates/templates/android_source.zip  ~/.local/share/godot/export_templates/4.3.stable/
          echo "Templates installed"

      - name: Setup Godot Android Keystore (debug)
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$(pwd)/debug.keystore" >> $GITHUB_ENV
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=androiddebugkey" >> $GITHUB_ENV
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android" >> $GITHUB_ENV

      - name: Configure Godot Editor settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << 'EOF'
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          export/android/debug_keystore = "/home/runner/work/survival_island/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/force_system_user = false
          export/android/shutdown_adb_on_exit = true
          export/android/gradle_build/use_gradle_build = false
          EOF

      - name: Create build directory
        run: mkdir -p build

      - name: Import Godot project (first run to generate .godot cache)
        run: |
          timeout 60 godot --headless --editor --quit --path . || true
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: Export Android APK (debug)
        run: |
          godot --headless --export-debug "Android" build/SurvivalIsland.apk --path .
        working-directory: ${{ github.workspace }}
        timeout-minutes: 15

      - name: Check APK was created
        run: |
          ls -la build/
          if [ -f "build/SurvivalIsland.apk" ]; then
            echo "✅ APK built successfully!"
            echo "APK size: $(du -sh build/SurvivalIsland.apk)"
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SurvivalIsland-APK
          path: build/SurvivalIsland.apk
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/SurvivalIsland.apk
          name: "Survival Island ${{ github.ref_name }}"
          body: "3D Mobile Survival Battle Royale — Godot 4.3"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
